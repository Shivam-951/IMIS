<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMIS — Intelligent Market Intelligence System</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/lightweight-charts.js"></script>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">IMIS</div>
      <div class="logo-sub">Intelligent Market Intelligence System</div>
    </div>
    <div class="header-right">
      <span class="last-update" id="lastUpdate">Loading...</span>
      <div class="live-dot"></div>
    </div>
  </header>

  <!-- Tab Switcher -->
  <div class="tab-bar">
  <button class="tab-btn active" data-tab="crypto">Crypto</button>
  <button class="tab-btn" data-tab="india">India Markets</button>
  <button class="tab-btn" data-tab="alerts">
    Alerts <span class="alert-badge" id="alertBadge">—</span>
  </button>
</div>

<!-- ALERTS TAB -->
<div id="tab-alerts" class="tab-content">

  <div class="alerts-header">
    <div class="alerts-filter">
      <button class="sev-btn active" data-sev="all">All</button>
      <button class="sev-btn" data-sev="high">High</button>
      <button class="sev-btn" data-sev="medium">Medium</button>
      <button class="sev-btn" data-sev="low">Low</button>
    </div>
    <button class="refresh-btn" onclick="refreshAlerts()">
      ↻ Refresh
    </button>
  </div>

  <div id="alertsList" class="alerts-list">
    <div class="loading-text">Loading alerts...</div>
  </div>

</div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CRYPTO TAB                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="tab-crypto" class="tab-content active">

    <div class="symbol-bar">
      <button class="sym-btn active" data-symbol="BTCUSDT">BTC</button>
      <button class="sym-btn" data-symbol="ETHUSDT">ETH</button>
      <button class="sym-btn" data-symbol="SOLUSDT">SOL</button>
      <button class="sym-btn" data-symbol="BNBUSDT">BNB</button>
      <button class="sym-btn" data-symbol="XRPUSDT">XRP</button>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
    </div>

    <div class="main-grid">
      <div class="panel chart-panel">
        <div class="panel-header">
          <div class="panel-title" id="chartTitle">BTC / USDT</div>
          <div class="chart-controls">
            <button class="days-btn active" data-days="30">1M</button>
            <button class="days-btn" data-days="90">3M</button>
            <button class="days-btn" data-days="180">6M</button>
            <button class="days-btn" data-days="365">1Y</button>
          </div>
        </div>
        <div id="priceChart" class="chart-container"></div>
      </div>

      <div class="panel signals-panel">
        <div class="panel-header">
          <div class="panel-title">Active Signals</div>
          <span class="signal-count" id="signalCount">—</span>
        </div>
        <div id="signalsList" class="signals-list">
          <div class="loading-text">Loading signals...</div>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">RSI — 14</div>
          <div class="rsi-value" id="rsiValue">—</div>
        </div>
        <div id="rsiChart" class="chart-container-sm"></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">MACD</div>
          <div class="macd-value" id="macdValue">—</div>
        </div>
        <div id="macdChart" class="chart-container-sm"></div>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- INDIA TAB                                   -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="tab-india" class="tab-content">

    <!-- Category filter -->
    <div class="symbol-bar">
      <button class="cat-btn active" data-cat="all">All</button>
      <button class="cat-btn" data-cat="indices">Indices</button>
      <button class="cat-btn" data-cat="stocks">Stocks</button>
      <button class="cat-btn" data-cat="commodities">Commodities</button>
      <button class="cat-btn" data-cat="currency">Currency</button>
    </div>

    <!-- India cards -->
    <div class="india-cards-grid" id="indiaCardsGrid">
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
    </div>

    <!-- India chart -->
    <div class="main-grid">
      <div class="panel chart-panel">
        <div class="panel-header">
          <div class="panel-title" id="indiaChartTitle">Select an asset</div>
          <div class="chart-controls">
            <button class="india-days-btn active" data-days="30">1M</button>
            <button class="india-days-btn" data-days="90">3M</button>
            <button class="india-days-btn" data-days="180">6M</button>
            <button class="india-days-btn" data-days="365">1Y</button>
          </div>
        </div>
        <div id="indiaPriceChart" class="chart-container"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Market Overview</div>
        </div>
        <div id="indiaOverview" class="signals-list">
          <div class="loading-text">Loading...</div>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">RSI — 14</div>
          <div class="rsi-value" id="indiaRsiValue">—</div>
        </div>
        <div id="indiaRsiChart" class="chart-container-sm"></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">MACD</div>
          <div class="macd-value" id="indiaMacdValue">—</div>
        </div>
        <div id="indiaMacdChart" class="chart-container-sm"></div>
      </div>
    </div>

  </div>

</div>

<script src="/js/lightweight-charts.js"></script>
<script src="/js/alerts.js"></script>
<script src="/js/signals.js"></script>
<script src="/js/chart.js"></script>
<script src="/js/india.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
